<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000">
  <!-- Tilted capsule pill (DrugBank logo style) -->
  <g transform="translate(500,500) rotate(-50)">
    <!-- Full capsule outline -->
    <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="28"
      d="M -260,-175 L 260,-175 A 175,175 0 0 1 260,175 L -260,175 A 175,175 0 0 1 -260,-175 Z"/>
    <!-- Filled left half (becomes lower-left after rotation) -->
    <path stroke="none"
      d="M 0,-175 L -260,-175 A 175,175 0 0 0 -260,175 L 0,175 Z"/>
    <!-- Dividing line -->
    <line fill="none" stroke-width="28" stroke-linecap="round"
      x1="0" y1="-175" x2="0" y2="175"/>
    <!-- 3D shadow: filled crescent on the outlined half -->
    <path stroke="none"
      d="M 0,-175 L 0,175 C 100,100 100,-100 0,-175 Z"/>
  </g>
</svg>
