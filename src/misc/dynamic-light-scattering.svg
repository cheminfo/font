<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000">

  <!-- Light source (parallelogram aligned with incident beam) -->
  <path d="M 56,530 L 33,480 L 124,438 L 147,488 Z"
    style="stroke:none" />

  <!-- Incident laser beam: source to beaker left wall -->
  <line x1="136" y1="463" x2="350" y2="350"
    style="fill:none;stroke-width:22;stroke-linecap:round" />

  <!-- Sample beaker -->
  <path d="M 350,100 L 350,430 Q 350,480 400,480 L 600,480 Q 650,480 650,430 L 650,100"
    style="fill:none;stroke-width:24;stroke-linecap:round;stroke-linejoin:round" />

  <!-- Liquid surface line -->
  <line x1="362" y1="160" x2="638" y2="160"
    style="fill:none;stroke-width:18;stroke-linecap:round" />

  <!-- Particles inside beaker (hollow circles) -->
  <circle cx="440" cy="280" r="22" style="fill:none;stroke-width:16" />
  <circle cx="550" cy="340" r="18" style="fill:none;stroke-width:16" />
  <circle cx="480" cy="400" r="15" style="fill:none;stroke-width:16" />
  <circle cx="570" cy="240" r="20" style="fill:none;stroke-width:16" />
  <circle cx="430" cy="380" r="14" style="fill:none;stroke-width:16" />

  <!-- Scattered light beam: beaker right wall to detector -->
  <line x1="650" y1="350" x2="864" y2="463"
    style="fill:none;stroke-width:22;stroke-linecap:round" />

  <!-- Detector (parallelogram aligned with scattered beam) -->
  <path d="M 853,488 L 876,438 L 967,480 L 944,530 Z"
    style="stroke:none" />

  <!-- "DLS" label at bottom center -->
  <text x="500" y="730" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="250" stroke="none">DLS</text>

</svg>
