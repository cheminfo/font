<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" stroke="currentColor" viewBox="0 0 1000 1000">
  <!-- 1H NMR spectrum with 4 numbered signals -->

  <!-- Spectrum baseline with peaks (stroke 32) -->
  <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
    d="M 50,700 H 155 L 180,280 L 205,700 H 325 L 360,420 L 395,700 H 490 L 510,500 L 530,700 L 550,370 L 570,700 H 710 L 740,490 L 770,700 H 950"/>

  <!-- Numbered labels above each signal -->
  <text x="180" y="210" font-family="sans-serif" font-size="120" font-weight="bold" stroke="none" text-anchor="middle">1</text>
  <text x="360" y="350" font-family="sans-serif" font-size="120" font-weight="bold" stroke="none" text-anchor="middle">2</text>
  <text x="545" y="300" font-family="sans-serif" font-size="120" font-weight="bold" stroke="none" text-anchor="middle">3</text>
  <text x="740" y="420" font-family="sans-serif" font-size="120" font-weight="bold" stroke="none" text-anchor="middle">4</text>

  <!-- Count at bottom -->
  <text x="500" y="900" font-family="sans-serif" font-size="160" font-weight="bold" stroke="none" text-anchor="middle">= 4</text>
</svg>
