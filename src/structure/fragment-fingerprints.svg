<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000" height="1000"
   viewBox="0 0 1000 1000">
  <!-- 3x3 grid of fragment cards -->
  <!-- Card: 290x290, gap 25, margin 40 -->
  <!-- All bond angles are 120°, bond length ~100, bonds at ±30° from horizontal -->
  <!-- dx=87 (100*cos30°), dy=50 (100*sin30°) -->

  <!-- Row 1 -->
  <!-- Card 1,1: 3-bond zigzag chain, center (185,185) -->
  <rect x="40" y="40" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <polyline fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
    points="55,210 142,160 229,210 316,160"/>

  <!-- Card 1,2: single bond at 30°, center (500,185) -->
  <rect x="355" y="40" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <line x1="420" y1="225" x2="580" y2="145" fill="none" stroke-width="18" stroke-linecap="round"/>

  <!-- Card 1,3: benzene hexagon + aromatic circle, center (815,185) -->
  <rect x="670" y="40" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <polygon fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
    points="815,95 893,140 893,230 815,275 737,230 737,140"/>
  <circle cx="815" cy="185" r="50" fill="none" stroke-width="18"/>

  <!-- Row 2 -->
  <!-- Card 2,1: V-shape (2 bonds, 120° at vertex), center (185,500) -->
  <rect x="40" y="355" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <polyline fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
    points="81,450 185,510 289,450"/>

  <!-- Card 2,2: double bond, center (500,500) -->
  <rect x="355" y="355" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <line x1="410" y1="485" x2="590" y2="485" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="410" y1="515" x2="590" y2="515" fill="none" stroke-width="18" stroke-linecap="round"/>

  <!-- Card 2,3: Y-branch (3 bonds at 120°), center (815,500) -->
  <rect x="670" y="355" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <line x1="815" y1="525" x2="815" y2="425" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="815" y1="525" x2="728" y2="575" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="815" y1="525" x2="902" y2="575" fill="none" stroke-width="18" stroke-linecap="round"/>

  <!-- Row 3 -->
  <!-- Card 3,1: carbonyl (Y-branch with O), center (185,815) -->
  <!-- Visual bbox: O text top ~755 to bond bottom 920 = 165 tall, center at 837.5, shift down 22 -->
  <rect x="40" y="670" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <line x1="185" y1="862" x2="98" y2="912" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="185" y1="862" x2="272" y2="912" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="185" y1="862" x2="185" y2="772" fill="none" stroke-width="18" stroke-linecap="round"/>
  <text x="185" y="752" text-anchor="middle" font-family="sans-serif" font-size="75" stroke="none" font-weight="bold">O</text>

  <!-- Card 3,2: cyclohexane (no aromatic circle), center (500,815), side=90 -->
  <rect x="355" y="670" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <polygon fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
    points="500,725 578,770 578,860 500,905 422,860 422,770"/>

  <!-- Card 3,3: triple bond, center (815,815) -->
  <rect x="670" y="670" width="290" height="290" rx="28" fill="none" stroke-width="18" stroke-linejoin="round"/>
  <line x1="730" y1="790" x2="900" y2="790" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="730" y1="815" x2="900" y2="815" fill="none" stroke-width="18" stroke-linecap="round"/>
  <line x1="730" y1="840" x2="900" y2="840" fill="none" stroke-width="18" stroke-linecap="round"/>
</svg>
