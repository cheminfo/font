<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000">
  <!-- Mass spectrum baseline -->
  <line x1="60" y1="750" x2="880" y2="750"
    fill="none" stroke-linecap="round" stroke-width="28"/>
  <!-- Arrow head -->
  <polyline fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="28"
    points="880,710 950,750 880,790"/>
  <!-- Small peaks for context -->
  <line x1="180" y1="750" x2="180" y2="580" fill="none" stroke-linecap="round" stroke-width="30"/>
  <line x1="580" y1="750" x2="580" y2="520" fill="none" stroke-linecap="round" stroke-width="30"/>
  <line x1="740" y1="750" x2="740" y2="620" fill="none" stroke-linecap="round" stroke-width="30"/>
  <!-- Main peak with crosshair target -->
  <line x1="380" y1="750" x2="380" y2="80" fill="none" stroke-linecap="round" stroke-width="30"/>
  <!-- Crosshair circle -->
  <circle cx="380" cy="160" r="100" fill="none" stroke-width="16"/>
  <!-- Crosshair horizontal line -->
  <line x1="250" y1="160" x2="510" y2="160" fill="none" stroke-width="16"/>
</svg>
