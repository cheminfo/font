<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000">
  <!-- Mass spectrum baseline -->
  <line x1="60" y1="750" x2="880" y2="750"
    fill="none" stroke-linecap="round" stroke-width="28"/>
  <!-- Arrow head -->
  <polyline fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="28"
    points="880,710 950,750 880,790"/>
  <!-- Isotope envelope: 5 peaks at regular spacing -->
  <!-- M: 55% height -->
  <line x1="200" y1="750" x2="200" y2="390" fill="none" stroke-linecap="round" stroke-width="36"/>
  <!-- M+1: 100% height (tallest) -->
  <line x1="330" y1="750" x2="330" y2="100" fill="none" stroke-linecap="round" stroke-width="36"/>
  <!-- M+2: 80% height -->
  <line x1="460" y1="750" x2="460" y2="230" fill="none" stroke-linecap="round" stroke-width="36"/>
  <!-- M+3: 45% height -->
  <line x1="590" y1="750" x2="590" y2="460" fill="none" stroke-linecap="round" stroke-width="36"/>
  <!-- M+4: 18% height -->
  <line x1="720" y1="750" x2="720" y2="630" fill="none" stroke-linecap="round" stroke-width="36"/>
</svg>
