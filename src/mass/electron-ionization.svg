<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000">
  <!-- Electron label "e" with superscript minus -->
  <text x="130" y="520" font-family="sans-serif" font-size="280" font-style="italic" stroke="none">e</text>
  <text x="290" y="380" font-family="sans-serif" font-size="150" stroke="none">&#x2212;</text>
  <!-- Arrow: electron beam going right -->
  <line x1="380" y1="450" x2="580" y2="450"
    fill="none" stroke-linecap="round" stroke-width="28"/>
  <polygon points="580,425 640,450 580,475" stroke="none"/>
  <!-- Target molecule: small circle -->
  <circle cx="720" cy="450" r="60" fill="none" stroke-width="24"/>
  <!-- Ionization result: fragments flying off -->
  <!-- Fragment going upper-right -->
  <line x1="770" y1="410" x2="870" y2="300"
    fill="none" stroke-linecap="round" stroke-width="20"/>
  <polygon points="860,280 900,280 870,310" stroke="none"/>
  <!-- Fragment going lower-right -->
  <line x1="770" y1="490" x2="870" y2="600"
    fill="none" stroke-linecap="round" stroke-width="20"/>
  <polygon points="860,620 900,620 870,590" stroke="none"/>
  <!-- Charge indicator "+" on upper fragment -->
  <text x="920" y="310" font-family="sans-serif" font-size="100" stroke="none">+</text>
</svg>
