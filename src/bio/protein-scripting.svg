<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg stroke="currentColor" fill="currentColor"
   xmlns="http://www.w3.org/2000/svg"
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000">
  <!-- Zinc finger at ~75% scale, positioned upper-left -->
  <g transform="translate(-20,-20) scale(0.65)">
    <!-- Beta hairpin -->
    <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="50"
      d="M 80,950 L 80,300 C 80,160 320,160 320,300 L 320,620"/>
    <!-- Connecting loop -->
    <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="50"
      d="M 320,620 C 340,800 580,810 620,660"/>
    <!-- Alpha helix -->
    <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="50"
      d="M 620,660
         C 820,560 820,500 650,420
         C 520,360 520,300 700,220
         C 880,140 860,80 720,50"/>
    <!-- Zinc atom -->
    <circle cx="400" cy="420" r="80" fill="none" stroke-width="39"/>
    <text x="400" y="450"
       text-anchor="middle"
       font-family="sans-serif"
       font-weight="bold"
       font-size="88"
       stroke="none">Zn</text>
  </g>
  <!-- Terminal/scripting box -->
  <rect x="550" y="630" width="400" height="320" rx="25" ry="25"
     fill="none" stroke-width="25" />
  <text x="750" y="845"
     text-anchor="middle"
     font-family="monospace" font-weight="bold" font-size="200"
     stroke="none">&gt;_</text>
</svg>
